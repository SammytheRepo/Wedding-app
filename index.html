<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ivory: #FFFDF7;
            --champagne: #F4EAE0;
            --rose-gold: #B76E79;
            --deep-rose: #8B5A5F;
            --charcoal: #3A3A3A;
            --soft-shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--ivory) 0%, var(--champagne) 100%);
            min-height: 100vh;
            color: var(--charcoal);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--deep-rose);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--rose-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .divider {
            width: 100px;
            height: 1px;
            background: var(--rose-gold);
            margin: 20px auto;
            position: relative;
        }

        .divider::before {
            content: '♥';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ivory);
            padding: 0 10px;
            color: var(--rose-gold);
            font-size: 12px;
        }

        .upload-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 60px;
            box-shadow: 0 10px 40px var(--soft-shadow);
            animation: fadeInUp 1s ease 0.2s both;
        }

        .upload-area {
            border: 2px dashed var(--rose-gold);
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover {
            border-color: var(--deep-rose);
            background: var(--champagne);
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            background: var(--champagne);
            border-color: var(--deep-rose);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--rose-gold);
        }

        .upload-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: var(--deep-rose);
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.9rem;
            color: #999;
        }

        input[type="file"] {
            display: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #E5E5E5;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 20px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--rose-gold);
            box-shadow: 0 0 0 3px rgba(183, 110, 121, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, var(--rose-gold) 0%, var(--deep-rose) 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 400;
            box-shadow: 0 4px 15px rgba(183, 110, 121, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(183, 110, 121, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px var(--soft-shadow);
        }

        .preview-item img,
        .preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            color: var(--deep-rose);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .remove-btn:hover {
            background: var(--rose-gold);
            color: white;
        }

        .gallery-section {
            animation: fadeInUp 1s ease 0.4s both;
        }

        .gallery-header {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            text-align: center;
            color: var(--deep-rose);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .gallery-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 30px var(--soft-shadow);
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease both;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }

        .gallery-media {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            cursor: pointer;
        }

        .gallery-info {
            padding: 20px;
        }

        .uploader-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: var(--deep-rose);
            margin-bottom: 5px;
        }

        .upload-time {
            font-size: 0.85rem;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--rose-gold);
            font-style: italic;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            background: none;
            border: none;
            transition: transform 0.2s ease;
        }

        .modal-close:hover {
            transform: scale(1.2);
        }

        .success-message {
            background: #D4EDDA;
            color: #155724;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideDown 0.5s ease;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: #F8D7DA;
            color: #721C24;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .upload-section {
                padding: 25px;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Wedding Memories</h1>
            <div class="divider"></div>
            <p class="subtitle">Share Your Special Moments</p>
        </header>

        <section class="upload-section">
            <div class="success-message" id="successMessage">
                ✓ Your memories have been shared successfully!
            </div>
            <div class="error-message" id="errorMessage">
                Something went wrong. Please try again.
            </div>

            <input type="text" id="uploaderName" placeholder="Your Name (optional)">
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">Drop photos or videos here</div>
                <div class="upload-hint">or click to browse • Max 50MB per file</div>
                <input type="file" id="fileInput" multiple accept="image/*,video/*">
            </div>

            <div class="preview-container" id="previewContainer"></div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" id="uploadBtn" disabled>Share Memories</button>
            </div>
        </section>

        <section class="gallery-section">
            <h2 class="gallery-header">Shared Memories</h2>
            <div class="loading" id="loadingIndicator">Loading beautiful moments...</div>
            <div class="gallery-grid" id="galleryGrid"></div>
        </section>
    </div>

    <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">&times;</button>
        <img class="modal-content" id="modalContent">
    </div>

    <script>
        // Configuration - Replace with your server endpoint
        const API_ENDPOINT = '/api'; // Change this to your backend URL

        let selectedFiles = [];
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploaderName = document.getElementById('uploaderName');
        const galleryGrid = document.getElementById('galleryGrid');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Upload area interactions
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                if (file.size > 50 * 1024 * 1024) {
                    showError(`File ${file.name} is too large. Maximum size is 50MB.`);
                    continue;
                }
                
                if (!file.type.match(/image.*|video.*/)) {
                    showError(`File ${file.name} is not a supported format.`);
                    continue;
                }

                selectedFiles.push(file);
                createPreview(file);
            }
            
            uploadBtn.disabled = selectedFiles.length === 0;
        }

        function createPreview(file) {
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';

            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.innerHTML = '&times;';
            removeBtn.onclick = () => {
                selectedFiles = selectedFiles.filter(f => f !== file);
                previewItem.remove();
                uploadBtn.disabled = selectedFiles.length === 0;
            };

            if (file.type.match(/image.*/)) {
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                previewItem.appendChild(img);
            } else if (file.type.match(/video.*/)) {
                const video = document.createElement('video');
                video.src = URL.createObjectURL(file);
                video.muted = true;
                previewItem.appendChild(video);
            }

            previewItem.appendChild(removeBtn);
            previewContainer.appendChild(previewItem);
        }

        // Upload files
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('uploaderName', uploaderName.value || 'Guest');
            
            selectedFiles.forEach((file, index) => {
                formData.append('files', file);
            });

            try {
                // Replace this with your actual upload endpoint
                const response = await fetch(`${API_ENDPOINT}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showSuccess();
                    selectedFiles = [];
                    previewContainer.innerHTML = '';
                    uploaderName.value = '';
                    fileInput.value = '';
                    uploadBtn.textContent = 'Share Memories';
                    loadGallery(); // Refresh gallery
                } else {
                    showError('Upload failed. Please try again.');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showError('Upload failed. Please check your connection.');
            } finally {
                uploadBtn.disabled = false;
            }
        });

        function showSuccess() {
            successMessage.classList.add('show');
            setTimeout(() => successMessage.classList.remove('show'), 5000);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        // Load gallery
        async function loadGallery() {
            loadingIndicator.style.display = 'block';
            galleryGrid.innerHTML = '';

            try {
                // Replace this with your actual API endpoint
                const response = await fetch(`${API_ENDPOINT}/gallery`);
                const items = await response.json();

                loadingIndicator.style.display = 'none';

                items.forEach((item, index) => {
                    const galleryItem = document.createElement('div');
                    galleryItem.className = 'gallery-item';
                    galleryItem.style.animationDelay = `${index * 0.1}s`;

                    const isVideo = item.type && item.type.includes('video');
                    const mediaElement = isVideo 
                        ? `<video class="gallery-media" src="${item.url}" muted loop onmouseenter="this.play()" onmouseleave="this.pause()"></video>`
                        : `<img class="gallery-media" src="${item.url}" alt="Wedding memory">`;

                    galleryItem.innerHTML = `
                        ${mediaElement}
                        <div class="gallery-info">
                            <div class="uploader-name">${item.uploaderName || 'Guest'}</div>
                            <div class="upload-time">${formatDate(item.uploadedAt)}</div>
                        </div>
                    `;

                    if (!isVideo) {
                        galleryItem.querySelector('.gallery-media').addEventListener('click', () => {
                            modalContent.src = item.url;
                            modalContent.style.display = 'block';
                            modal.classList.add('active');
                        });
                    }

                    galleryGrid.appendChild(galleryItem);
                });
            } catch (error) {
                console.error('Gallery load error:', error);
                loadingIndicator.textContent = 'Could not load gallery. Please refresh.';
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return `${diffMins} minutes ago`;
            
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `${diffHours} hours ago`;
            
            const diffDays = Math.floor(diffHours / 24);
            if (diffDays < 7) return `${diffDays} days ago`;
            
            return date.toLocaleDateString();
        }

        // Modal controls
        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Load gallery on page load
        loadGallery();

        // Refresh gallery every 30 seconds
        setInterval(loadGallery, 30000);
    </script>
</body>
</html>
